<!DOCTYPE html>
<html>
<head>
    <title>Staff Login</title>
    <link rel="stylesheet" type="text/css" href="/static/styler.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">

<div class="card" style="width: 350px; text-align: center;">
    <h2 style="color: var(--deep-rose);"> ROYAM Login</h2>
    <p>Please enter your credentials to access the ward.</p>
    <form method="POST">
        <input type="text" name="staffID" placeholder="Staff ID" required style="width: 90%;"><br>
        <input type="password" name="password" placeholder="Password" required style="width: 90%;"><br><br>
        <button type="submit" style="width: 100%;">Login ✨</button>
    </form>
    {% if error %}<p style="color:red; font-size: 0.8rem;">{{ error }}</p>{% endif %}
</div>

</body>
</html>
